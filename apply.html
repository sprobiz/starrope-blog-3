<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안전 연결 리다이렉트 중... | Starrope 자산관리 & 패시브인컴</title>
  
  <!-- Link CSS (relative path) -->
  <link rel="stylesheet" href="assets/style.css">
  
  <!-- Pre-configured Google AdSense Auto Ads Tag -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1692428092138510" crossorigin="anonymous"></script>

  <style>
    .bridge-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 24px;
    }
    .loading-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius-md);
      padding: 48px;
      box-shadow: var(--shadow-lg);
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-light);
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      font-family: var(--font-base);
    }
    .loading-desc {
      color: var(--text-muted);
      font-size: 14.5px;
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .manual-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: white !important;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 15px;
      transition: var(--transition-smooth);
      box-shadow: 0 4px 12px hsla(var(--hue), 85%, 38%, 0.2);
    }
    .manual-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px hsla(var(--hue), 85%, 38%, 0.35);
      filter: brightness(1.05);
    }
  </style>
</head>
<body>

  <!-- NAVBAR (Simplified) -->
  <header class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">S</div>
        <span class="gradient-text">Starrope 자산관리</span>
      </a>
    </div>
  </header>

  <main class="container bridge-container">
    <div class="loading-card">
      <div class="spinner"></div>
      <h2 class="loading-title">공식 신청 페이지 안전 연결 중</h2>
      <p class="loading-desc">
        사용자님의 안전한 데이터 연결과 경로 최적화를 점검하고 있습니다.<br>
        잠시 후 공식 제휴 및 신청 웹페이지로 자동 리다이렉트됩니다.
      </p>
      <a id="manual-link" href="#" class="manual-btn">지금 즉시 이동하기</a>
    </div>
  </main>

  <!-- FOOTER (Simplified) -->
  <footer class="footer" style="padding: 30px 0; margin-top: auto;">
    <div class="container" style="text-align: center; color: var(--text-muted); font-size: 13px;">
      <p>&copy; 2026 Starrope 자산관리 & 패시브인컴. All rights reserved.</p>
    </div>
  </footer>

  <!-- Link JS -->
  <script src="assets/main.js"></script>
  
  <script>
    // Extract target parameter from URL
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    const targetUrl = getQueryParam('target');
    const manualLink = document.getElementById('manual-link');

    if (targetUrl && (targetUrl.startsWith('http://') || targetUrl.startsWith('https://'))) {
      manualLink.href = targetUrl;
      
      // 1.5 seconds delay (ensuring enough buffer time to trigger Google Vignette ads)
      setTimeout(() => {
        window.location.href = targetUrl;
      }, 1500);
    } else {
      // If no valid parameter is provided, redirect to home
      document.querySelector('.loading-title').textContent = "올바르지 않은 요청입니다";
      document.querySelector('.loading-desc').textContent = "오류가 감지되어 메인 홈페이지로 안전하게 이동합니다.";
      manualLink.href = "index.html";
      manualLink.textContent = "홈으로 이동";
      setTimeout(() => {
        window.location.href = "index.html";
      }, 2000);
    }
  </script>
</body>
</html>
